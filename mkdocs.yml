site_name: TOGAF Financial Enterprise Architecture Blueprint
site_description: Practical TOGAF ADM implementation for a financial services enterprise
repo_url: https://github.com/your-org/togaf-financial-enterprise-architecture
theme:
  name: material
  language: es
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.highlight
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
