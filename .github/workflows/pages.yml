name: Publish GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java for PlantUML
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install "mkdocs-material<10" "mkdocs<2" pymdown-extensions
          sudo apt-get update
          sudo apt-get install -y graphviz
          curl -L -o plantuml.jar https://github.com/plantuml/plantuml/releases/latest/download/plantuml.jar

      - name: Render PlantUML and ArchiMate diagrams
        run: |
          mkdir -p docs/assets/diagrams/archimate
          mkdir -p docs/assets/diagrams/plantuml
          if ls docs/15-diagrams/archimate/*.puml 1> /dev/null 2>&1; then
            java -jar plantuml.jar -tsvg -o ../../assets/diagrams/archimate docs/15-diagrams/archimate/*.puml
          fi
          if ls docs/15-diagrams/plantuml/*.puml 1> /dev/null 2>&1; then
            java -jar plantuml.jar -tsvg -o ../../assets/diagrams/plantuml docs/15-diagrams/plantuml/*.puml
          fi

      - name: Build MkDocs site
        run: |
          mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
